name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # 1. Build and Publish to PyPI
  pypi_release:
    name: PyPI Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Build and upload to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  # 2. Publish to Crates.io
  crates_io_publish:
    name: Crates.io Publish
    runs-on: ubuntu-latest
    needs: pypi_release # distinct step to avoid race conditions
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to Crates.io
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}

  # 3. Build Binaries for GitHub Releases
  build_binaries:
    name: Build Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: icon-to-image-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            name: icon-to-image-macos-intel
          - os: macos-14 # Apple Silicon runner
            target: aarch64-apple-darwin
            name: icon-to-image-macos-arm
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: icon-to-image-windows.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build Binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: target/${{ matrix.target }}/release/icon-to-image${{ matrix.os == 'windows-latest' && '.exe' || '' }}
