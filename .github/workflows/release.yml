name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  crates_io_publish:
    name: Crates.io Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to Crates.io
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  python_wheel:
    name: Python Wheel
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux
          - os: ubuntu-24.04-arm
            suffix: linux-arm64
          - os: macos-15-intel
            suffix: macos-intel
          - os: macos-latest
            suffix: macos-arm
          - os: windows-latest
            suffix: windows
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release -i python --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.suffix }}
          path: dist/*.whl

  python_sdist:
    name: Python sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  rust_binaries:
    name: Rust Binary
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-x64
            ext: ""
          - os: ubuntu-24.04-arm
            suffix: linux-arm64
            ext: ""
          - os: macos-15-intel
            suffix: macos-x64
            ext: ""
          - os: macos-latest
            suffix: macos-arm64
            ext: ""
          - os: windows-latest
            suffix: windows-x64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release --bin icon-to-image
      - name: Prepare release asset
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/icon-to-image${{ matrix.ext }}" \
            "dist/icon-to-image-${{ matrix.suffix }}${{ matrix.ext }}"
      - uses: actions/upload-artifact@v4
        with:
          name: rust-binary-${{ matrix.suffix }}
          path: dist/icon-to-image-${{ matrix.suffix }}${{ matrix.ext }}

  python_publish:
    name: Publish Python
    needs: [python_wheel, python_sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
      - name: Upload Python artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  rust_publish:
    name: Publish Rust Binaries
    needs: [rust_binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: rust-binary-*
          path: dist
          merge-multiple: true
      - name: Upload Rust binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
